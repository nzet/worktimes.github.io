<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polish Work Time Tracking Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Polish Work Time Tracker</h1>
    </header>
    <main>
        <section>
            <h2>Track Your Work Time</h2>
            <form id="work-time-form">
                <label for="task">Task:</label>
                <input type="text" id="task" name="task" required>
                <label for="hours">Hours Worked:</label>
                <input type="number" id="hours" name="hours" required>
                <button type="submit">Submit</button>
            </form>
        </section>
        <section>
            <h2>Recorded Work Time</h2>
            <table id="work-time-table">
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Hours</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Entries will be dynamically inserted here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Polish Work Time Tracking Application.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
