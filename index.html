<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ewidencja">
<meta name="theme-color" content="#0f172a">
<title>Ewidencja czasu pracy PRO</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* Весь CSS без змін (залишив точно як у тебе) */
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--surface:#1e293b;--surface2:#263347;--border:rgba(148,163,184,0.12);--border2:rgba(148,163,184,0.22);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--accent2:#1d4ed8;--green:#22c55e;--amber:#f59e0b;--cyan:#06b6d4;--red:#ef4444;--radius:14px;--radius-sm:9px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
body{overscroll-behavior:none;}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,23,42,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-top:var(--safe-top);border-bottom:0.5px solid var(--border);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.nav-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.nav-right{display:flex;gap:8px;}
.nav-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background 0.15s;}
.nav-btn:active{background:var(--accent);color:#fff;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;gap:3px;color:var(--text3);transition:color 0.15s;font-size:10px;font-weight:500;border:none;background:none;}
.tab.active{color:var(--accent);}
.tab-icon{font-size:20px;line-height:1;}
.page-wrap{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.page.active{display:block;}
.page-content{padding:16px;padding-top:calc(var(--safe-top)+70px);padding-bottom:calc(var(--safe-bot)+74px);}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.field label{font-size:12px;color:var(--text2);font-weight:500;}
select,input[type=date],input[type=time]{width:100%;padding:11px 14px;font-size:15px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none;-webkit-appearance:none;}
select:focus,input[type=date]:focus,input[type=time]:focus{outline:none;border-color:var(--accent);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chip{padding:6px 12px;font-size:13px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--bg3);color:var(--text2);transition:all 0.12s;user-select:none;font-weight:500;}
.chip.on{background:rgba(59,130,246,0.2);border-color:var(--accent);color:var(--accent);}
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tblock{background:var(--bg3);border-radius:var(--radius-sm);border:0.5px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:6px;}
.tlabel{font-size:11px;color:var(--text3);font-weight:500;}
.tvalue{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text3);letter-spacing:1px;transition:color 0.2s;}
.tvalue.set{color:var(--green);}
.trow{display:flex;gap:6px;}
.tbtn{flex:1;padding:8px 6px;font-size:12px;font-weight:600;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s;font-family:'DM Sans',sans-serif;}
.tbtn:active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(0.97);}
.geo-pill{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--bg2);color:var(--text3);cursor:pointer;border:0.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:all 0.12s;}
.geo-pill.ok{background:rgba(34,197,94,0.12);color:var(--green);border-color:rgba(34,197,94,0.3);}
.geo-pill.err{background:rgba(239,68,68,0.12);color:var(--red);border-color:rgba(239,68,68,0.3);}
.map-wrap{border-radius:var(--radius-sm);overflow:hidden;height:200px;margin-top:10px;border:0.5px solid var(--border);}
#map{height:100%;width:100%;}
.map-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.btn-primary{width:100%;padding:15px;font-size:16px;font-weight:600;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-bottom:8px;letter-spacing:-0.2px;}
.btn-primary:active{background:var(--accent2);transform:scale(0.98);}
.btn-secondary{width:100%;padding:13px;font-size:14px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-bottom:8px;}
.btn-secondary:active{background:var(--bg3);transform:scale(0.98);}
.btn-danger{width:100%;padding:13px;font-size:14px;font-weight:500;border:0.5px solid rgba(239,68,68,0.3);border-radius:var(--radius);background:rgba(239,68,68,0.08);color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-danger:active{background:rgba(239,68,68,0.2);}
.section-title{font-size:14px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:24px 0 12px 4px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.input-sm{width:100%;padding:11px 14px;font-size:15px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;}
.export-info{font-size:13px;color:var(--text3);background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;margin:16px 0;}
.duration-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);padding:4px 10px;border-radius:9999px;font-size:13px;font-weight:600;}
.storage-warning{background:#f59e0b;color:#0f172a;padding:10px 16px;border-radius:8px;font-size:13px;text-align:center;margin:8px 16px 0;display:none;}
.time-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.time-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;font-size:14px;}
.time-row span:first-child{font-weight:500;color:var(--text2);}
</style>
</head>
<body>

<nav class="nav">... (та сама навігація як у тебе)</nav>
<div id="storage-warning" class="storage-warning">⚠️ Tryb pamięci (dane nie zapisują się po odświeżeniu strony)</div>

<div class="page-wrap">
  <!-- PAGE FORM, HISTORY, EXPORT, SETTINGS — повністю як у тебе (без змін) -->
  <!-- ... (весь HTML сторінок залишається точно таким, як ти надіслав) ... -->
</div>

<nav class="tab-bar">... (та сама панель)</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
//===========================
// Ewidencja PRO – ВИПРАВЛЕНО: автоматичний розрахунок часу + один запис на дату
//===========================

const safeStorage = {
  getItem(key){try{return localStorage.getItem(key)}catch(e){return null}},
  setItem(key,value){try{localStorage.setItem(key,value)}catch(e){}}
};

let times={}, geos={}, selectedPassengers=[];
let workers=[], cars=[], contracts=[], records=[];
let currentDraft=null;

const timeBlocks=[{id:'start_drive',label:'Start dojazdu',color:'#3b82f6'},{id:'end_drive',label:'Koniec dojazdu',color:'#06b6d4'},{id:'start_work',label:'Start pracy',color:'#22c55e'},{id:'end_work',label:'Koniec pracy',color:'#f59e0b'}];

let map, markers={};

// ======================= DRAFT =======================
// (залишив без змін — працює як раніше)
function saveDraft(){/* ... */} 
function loadDraft(){/* ... */} 
function clearDraft(){currentDraft=null; safeStorage.setItem('currentDraft','null');}

// ======================= ПОМІЧНИК ДЛЯ ТРИВАЛОСТІ =======================
function calculateDurations(rec) {
  let drive = 0, work = 0;
  if (rec.times?.start_drive && rec.times?.end_drive) {
    drive = (new Date(rec.times.end_drive) - new Date(rec.times.start_drive)) / (1000*60*60);
  }
  if (rec.times?.start_work && rec.times?.end_work) {
    work = (new Date(rec.times.end_work) - new Date(rec.times.start_work)) / (1000*60*60);
  }
  return { drive: drive.toFixed(2), work: work.toFixed(2) };
}

// ======================= ЗБЕРЕЖЕННЯ (ГОЛОВНА ФІЧА) =======================
function saveRecord() {
  const rec = {
    date: document.getElementById('workdate').value || new Date().toISOString().split('T')[0],
    worker: document.getElementById('worker').value,
    contract: document.getElementById('contract').value,
    driver: document.getElementById('driver').value,
    car: document.getElementById('car').value,
    passengers: [...selectedPassengers],
    times: {},
    geos: {...geos}
  };
  Object.keys(times).forEach(k => rec.times[k] = times[k] ? times[k].toISOString() : null);

  // Шукаємо вже існуючий запис за датою + працівником + контрактом
  const index = records.findIndex(r => 
    r.date === rec.date && r.worker === rec.worker && r.contract === rec.contract
  );

  if (index > -1) {
    // ОНОВЛЮЄМО ІСНУЮЧИЙ ЗАПИС
    const existing = records[index];
    Object.assign(existing.times, rec.times);
    Object.assign(existing.geos, rec.geos);
    if (rec.passengers.length) {
      existing.passengers = [...new Set([...(existing.passengers || []), ...rec.passengers])];
    }
    alert('✅ Оновлено існуючий запис (та сама дата + працівник + контракт)');
  } else {
    records.push(rec);
    alert('✅ Створено новий запис');
  }

  safeStorage.setItem('records', JSON.stringify(records));
  clearDraft();
  resetForm();
}

// ======================= ІНШІ ФУНКЦІЇ (loadRecords, loadStats, render...) =======================
// (всі інші функції залишив як у тебе, але з невеликими покращеннями)

function loadStats() {
  let totalDrive = 0, totalWork = 0;
  records.forEach(rec => {
    const d = calculateDurations(rec);
    totalDrive += parseFloat(d.drive);
    totalWork += parseFloat(d.work);
  });
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = `
    <div class="card"><div class="card-title">Всього записів</div><div style="font-size:32px;font-weight:600;color:var(--accent);font-family:monospace;">${records.length}</div></div>
    <div class="card"><div class="card-title">Загальний час доїзду</div><div style="font-size:28px;font-weight:600;color:var(--cyan);font-family:monospace;">${totalDrive.toFixed(1)} год</div></div>
    <div class="card"><div class="card-title">Загальний час роботи</div><div style="font-size:28px;font-weight:600;color:var(--green);font-family:monospace;">${totalWork.toFixed(1)} год</div></div>
  `;
}

function loadRecords() {
  const container = document.getElementById('rec-list');
  container.innerHTML = '';
  if (!records.length) {
    container.innerHTML = `<div class="card" style="text-align:center;color:var(--text3);padding:60px 20px;">Brak wpisów</div>`;
    return;
  }
  records.forEach((rec, idx) => {
    const dur = calculateDurations(rec);
    const card = document.createElement('div');
    card.className = 'card';
    let html = `<div class="card-title">${rec.date} • ${rec.worker||'—'} / ${rec.contract||'—'}</div>`;
    html += `<p style="font-size:13px;margin-bottom:10px;"><strong>Kierowca:</strong> ${rec.driver||'—'} | <strong>Auto:</strong> ${rec.car||'—'}</p>`;
    if (rec.passengers?.length) html += `<p style="font-size:13px;margin-bottom:12px;"><strong>Pasażerowie:</strong> ${rec.passengers.join(', ')}</p>`;

    html += `<div class="time-list">`;
    timeBlocks.forEach(tb => {
      const t = rec.times[tb.id];
      const timeStr = t ? new Date(t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '—';
      html += `<div class="time-row"><span>${tb.label}</span><strong style="font-family:monospace;">${timeStr}</strong></div>`;
    });
    html += `</div>`;

    html += `<div style="margin-top:14px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">`;
    if (parseFloat(dur.drive) > 0) html += `<div class="duration-badge" style="color:var(--cyan);">🚗 Доїзд: <strong>${dur.drive} год</strong></div>`;
    if (parseFloat(dur.work) > 0) html += `<div class="duration-badge" style="color:var(--green);">💼 Робота: <strong>${dur.work} год</strong></div>`;
    html += `</div>`;

    html += `<button onclick="deleteRecord(${idx});" class="btn-danger" style="margin-top:16px;">🗑 Usuń wpis</button>`;
    card.innerHTML = html;
    container.appendChild(card);
  });
}

// ======================= INIT =======================
window.onload = () => {
  loadData();
  populateSelects();
  initTimeBlocks();
  initMap();
  loadDraft();
  renderPassengerChips();

  if (!document.getElementById('workdate').value) {
    document.getElementById('workdate').value = new Date().toISOString().split('T')[0];
  }

  console.log('%c✅ Ewidencja PRO – тривалість тепер рахує автоматично + один запис на дату', 'color:#22c55e;font-weight:600');
};
</script>
</body>
</html>
