<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ewidencja">
<meta name="theme-color" content="#0f172a">
<title>Ewidencja czasu pracy PRO</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--surface:#1e293b;--surface2:#263347;--border:rgba(148,163,184,0.12);--border2:rgba(148,163,184,0.22);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--accent2:#1d4ed8;--green:#22c55e;--amber:#f59e0b;--cyan:#06b6d4;--red:#ef4444;--radius:14px;--radius-sm:9px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
body{overscroll-behavior:none;}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,23,42,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-top:var(--safe-top);border-bottom:0.5px solid var(--border);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.nav-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.nav-right{display:flex;gap:8px;}
.nav-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background 0.15s;}
.nav-btn:active{background:var(--accent);color:#fff;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;gap:3px;color:var(--text3);transition:color 0.15s;font-size:10px;font-weight:500;border:none;background:none;}
.tab.active{color:var(--accent);}
.tab-icon{font-size:20px;line-height:1;}
.page-wrap{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.page.active{display:block;}
.page-content{padding:16px;padding-top:calc(var(--safe-top)+70px);padding-bottom:calc(var(--safe-bot)+74px);}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.field label{font-size:12px;color:var(--text2);font-weight:500;}
select,input[type=date],input[type=time],input[type=text]{width:100%;padding:11px 14px;font-size:15px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none;-webkit-appearance:none;}
select:focus,input:focus{outline:none;border-color:var(--accent);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chip{padding:6px 12px;font-size:13px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--bg3);color:var(--text2);transition:all 0.12s;user-select:none;font-weight:500;}
.chip.on{background:rgba(59,130,246,0.2);border-color:var(--accent);color:var(--accent);}
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tblock{background:var(--bg3);border-radius:var(--radius-sm);border:0.5px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:6px;}
.tlabel{font-size:11px;color:var(--text3);font-weight:500;}
.tvalue{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text3);letter-spacing:1px;transition:color 0.2s;}
.tvalue.set{color:var(--green);}
.trow{display:flex;gap:6px;}
.tbtn{flex:1;padding:8px 6px;font-size:12px;font-weight:600;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s;font-family:'DM Sans',sans-serif;}
.tbtn:active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(0.97);}
.geo-pill{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--bg2);color:var(--text3);cursor:default;border:0.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:all 0.12s;}
.geo-pill.ok{background:rgba(34,197,94,0.12);color:var(--green);border-color:rgba(34,197,94,0.3);}
.geo-pill.err{background:rgba(239,68,68,0.12);color:var(--red);border-color:rgba(239,68,68,0.3);}
.map-wrap{border-radius:var(--radius-sm);overflow:hidden;height:200px;margin-top:10px;border:0.5px solid var(--border);}
#map{height:100%;width:100%;}
.map-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.btn-primary{width:100%;padding:15px;font-size:16px;font-weight:600;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-bottom:8px;letter-spacing:-0.2px;}
.btn-primary:active{background:var(--accent2);transform:scale(0.98);}
.btn-secondary{width:100%;padding:13px;font-size:14px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-bottom:8px;}
.btn-secondary:active{background:var(--bg3);transform:scale(0.98);}
.btn-danger{width:100%;padding:13px;font-size:14px;font-weight:500;border:0.5px solid rgba(239,68,68,0.3);border-radius:var(--radius);background:rgba(239,68,68,0.08);color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-bottom:8px;}
.btn-danger:active{background:rgba(239,68,68,0.2);}
.section-title{font-size:14px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:24px 0 12px 4px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);padding:14px;border-radius:var(--radius);border:0.5px solid var(--border);}
.stat-val{font-size:24px;font-weight:600;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--text3);}
.rec-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.rec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.rec-date{font-weight:600;color:var(--cyan);}
.rec-body{font-size:13px;color:var(--text2);line-height:1.5;}
.settings-row{display:flex;gap:8px;margin-bottom:10px;}
.settings-row input{flex:1;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div>
      <div class="nav-title" id="nav-title">Nowy wpis</div>
      <div class="nav-sub" id="nav-sub">Ewidencja czasu pracy PRO</div>
    </div>
    <div class="nav-right">
      <button class="nav-btn" onclick="navAction()" title="Akcja">⋯</button>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <!-- PAGE FORM -->
  <div class="page active" id="page-form">
    <div class="page-content">
      <div class="card">
        <div class="card-title">Informacje podstawowe</div>
        <div class="field"><label>Pracownik</label><select id="worker"><option value="">— wybierz —</option></select></div>
        <div class="grid2">
          <div class="field"><label>Kontrakt</label><select id="contract"><option value="">— wybierz —</option></select></div>
          <div class="field"><label>Data</label><input type="date" id="workdate"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Transport</div>
        <div class="grid2" style="margin-bottom:10px">
          <div class="field"><label>Kierowca</label><select id="driver"><option value="">— wybierz —</option></select></div>
          <div class="field"><label>Nr rejestracyjny</label><select id="car"><option value="">— wybierz —</option></select></div>
        </div>
        <div class="field"><label>Pasażerowie</label><div class="chips" id="pchips"></div></div>
      </div>

      <div class="card">
        <div class="card-title">Czas i lokalizacja (automatyczne geo + czas)</div>
        <div class="time-grid" id="time-grid"></div>
        <div class="map-wrap"><div id="map"></div></div>
        <div class="map-legend">
          <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>Pocz. dojazdu</div>
          <div class="leg"><div class="leg-dot" style="background:#06b6d4"></div>Kon. dojazdu</div>
          <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>Pocz. pracy</div>
          <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>Kon. pracy</div>
        </div>
      </div>

      <button class="btn-primary" onclick="saveRecord()">💾 Zapisz wpis</button>
      <button class="btn-secondary" onclick="resetForm()">Wyczyść formularz</button>
    </div>
  </div>

  <!-- PAGE HISTORY -->
  <div class="page" id="page-records">
    <div class="page-content">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">Historia wpisów</div>
      <div id="rec-list"></div>
    </div>
  </div>

  <!-- PAGE EXPORT -->
  <div class="page" id="page-export">
    <div class="page-content">
      <div class="card">
        <div class="card-title">Eksport danych</div>
        <p style="font-size:13px; color:var(--text2); margin-bottom:16px;">Pobierz wszystkie zapisane wpisy w formacie arkusza kalkulacyjnego.</p>
        <button class="btn-primary" onclick="exportToXlsx()">📊 Eksportuj do XLSX</button>
        <button class="btn-secondary" onclick="exportToCsv()">📄 Eksportuj do CSV</button>
      </div>
    </div>
  </div>

  <!-- PAGE SETTINGS -->
  <div class="page" id="page-settings">
    <div class="page-content">
      <div class="card">
        <div class="card-title">Pracownicy</div>
        <div class="settings-row">
          <input type="text" id="new-worker" placeholder="Imię i nazwisko">
          <button class="tbtn" style="flex:0; padding:11px 16px;" onclick="addSetting('workers', 'new-worker')">Dodaj</button>
        </div>
        <div id="list-workers" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <div class="card-title">Kontrakty</div>
        <div class="settings-row">
          <input type="text" id="new-contract" placeholder="Nazwa kontraktu">
          <button class="tbtn" style="flex:0; padding:11px 16px;" onclick="addSetting('contracts', 'new-contract')">Dodaj</button>
        </div>
        <div id="list-contracts" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <div class="card-title">Samochody</div>
        <div class="settings-row">
          <input type="text" id="new-car" placeholder="Nr rejestracyjny">
          <button class="tbtn" style="flex:0; padding:11px 16px;" onclick="addSetting('cars', 'new-car')">Dodaj</button>
        </div>
        <div id="list-cars" style="margin-top:10px;"></div>
      </div>

      <div style="margin-top:24px;">
        <button class="btn-danger" onclick="clearAllData()">🗑 Usuń wszystkie dane (Hard Reset)</button>
      </div>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab active" id="tab-form" onclick="showPage('form')"><span class="tab-icon">✏️</span>Wpis</button>
  <button class="tab" id="tab-records" onclick="showPage('records')"><span class="tab-icon">📋</span>Historia</button>
  <button class="tab" id="tab-export" onclick="showPage('export')"><span class="tab-icon">📊</span>Eksport</button>
  <button class="tab" id="tab-settings" onclick="showPage('settings')"><span class="tab-icon">⚙️</span>Ustawienia</button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ======================= BEZPIECZNE STORAGE =======================
const safeStorage = {
  getItem(k) { try { return localStorage.getItem(k) } catch(e) { return null } },
  setItem(k,v) { try { localStorage.setItem(k,v) } catch(e) {} }
};

let times = {}, geos = {}, selectedPassengers = [];
let workers = JSON.parse(safeStorage.getItem('workers') || '[]');
let cars = JSON.parse(safeStorage.getItem('cars') || '[]');
let contracts = JSON.parse(safeStorage.getItem('contracts') || '[]');
let records = JSON.parse(safeStorage.getItem('records') || '[]');
let currentDraft = null;

const timeBlocks = [
  {id:'start_drive', label:'Start dojazdu', color:'#3b82f6'},
  {id:'end_drive',   label:'Koniec dojazdu', color:'#06b6d4'},
  {id:'start_work',  label:'Start pracy', color:'#22c55e'},
  {id:'end_work',    label:'Koniec pracy', color:'#f59e0b'}
];

let map, markers = {};

// ======================= NAV & PAGES =======================
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('tab-' + p).classList.add('active');
  
  if (p === 'records') { loadRecords(); loadStats(); }
  if (p === 'settings') { renderSettings(); }
  
  // Прокрутка сторінки нагорі при перемиканні
  document.getElementById('page-' + p).scrollTop = 0;
}

function navAction() { alert('Ewidencja czasu pracy PRO v1.0'); }

// ======================= DRAFT =======================
function saveDraft() {
  currentDraft = {
    worker: document.getElementById('worker').value,
    contract: document.getElementById('contract').value,
    driver: document.getElementById('driver').value,
    car: document.getElementById('car').value,
    workdate: document.getElementById('workdate').value,
    passengers: [...selectedPassengers],
    times: {},
    geos: {...geos}
  };
  Object.keys(times).forEach(k => currentDraft.times[k] = times[k] ? times[k].toISOString() : null);
  safeStorage.setItem('currentDraft', JSON.stringify(currentDraft));
}

function loadDraft() {
  const saved = safeStorage.getItem('currentDraft');
  if (!saved || saved === 'null') return;
  currentDraft = JSON.parse(saved);
  
  document.getElementById('worker').value = currentDraft.worker || '';
  document.getElementById('contract').value = currentDraft.contract || '';
  document.getElementById('driver').value = currentDraft.driver || '';
  document.getElementById('car').value = currentDraft.car || '';
  document.getElementById('workdate').value = currentDraft.workdate || '';
  
  selectedPassengers = currentDraft.passengers || [];
  times = {};
  geos = currentDraft.geos || {};
  
  Object.keys(currentDraft.times || {}).forEach(k => {
    if (currentDraft.times[k]) {
      times[k] = new Date(currentDraft.times[k]);
      const el = document.getElementById(k + '-time');
      if (el) {
        el.textContent = times[k].toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        el.classList.add('set');
      }
    }
  });
  
  // Оновлюємо маркери на карті з чернетки
  Object.keys(geos).forEach(k => {
    const geoPill = document.getElementById(k + '-geo');
    if(geoPill) {
      geoPill.textContent = `${geos[k][0].toFixed(5)}, ${geos[k][1].toFixed(5)}`;
      geoPill.className = 'geo-pill ok';
    }
    if (map) {
      const tb = timeBlocks.find(t => t.id === k);
      markers[k] = L.circleMarker(geos[k], {color: tb.color, radius: 8}).addTo(map).bindPopup(tb.label);
      map.setView(geos[k], 13);
    }
  });

  renderPassengerChips();
}

function clearDraft() {
  currentDraft = null;
  safeStorage.setItem('currentDraft', 'null');
}

// ======================= TIME BLOCKS + GEO =======================
function initTimeBlocks() {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  timeBlocks.forEach(tb => {
    const div = document.createElement('div');
    div.className = 'tblock';
    div.innerHTML = `
      <div class="tlabel">${tb.label}</div>
      <div class="tvalue" id="${tb.id}-time">—</div>
      <div class="trow">
        <button class="tbtn" onclick="setTime('${tb.id}')">⏱ Teraz + GEO</button>
        <button class="tbtn" onclick="clearTime('${tb.id}')">✖</button>
      </div>
      <div class="geo-pill" id="${tb.id}-geo">—</div>`;
    grid.appendChild(div);
  });
}

function setTime(id) {
  const now = new Date();
  times[id] = now;
  const timeEl = document.getElementById(id + '-time');
  timeEl.textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  timeEl.classList.add('set');
  getGeo(id);
  saveDraft();
}

function clearTime(id) {
  delete times[id];
  delete geos[id];
  const timeEl = document.getElementById(id + '-time');
  const geoEl = document.getElementById(id + '-geo');
  if (timeEl) { timeEl.textContent = '—'; timeEl.classList.remove('set'); }
  if (geoEl) { geoEl.textContent = '—'; geoEl.className = 'geo-pill'; }
  if (map && markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  saveDraft();
}

function getGeo(id) {
  const geoPill = document.getElementById(id + '-geo');
  if (!navigator.geolocation) {
    geoPill.textContent = 'Brak GPS';
    geoPill.className = 'geo-pill err';
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    geos[id] = [pos.coords.latitude, pos.coords.longitude];
    geoPill.textContent = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
    geoPill.className = 'geo-pill ok';
    
    if (map) {
      if (markers[id]) map.removeLayer(markers[id]);
      const tb = timeBlocks.find(t => t.id === id);
      markers[id] = L.circleMarker(geos[id], {color: tb.color, radius: 8}).addTo(map).bindPopup(tb.label);
      map.setView(geos[id], 15);
    }
    saveDraft();
  }, () => {
    geoPill.textContent = 'Błąd lokalizacji';
    geoPill.className = 'geo-pill err';
  }, { enableHighAccuracy: true });
}

// ======================= PASSENGERS =======================
function renderPassengerChips() {
  const container = document.getElementById('pchips');
  container.innerHTML = '';
  workers.forEach(w => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (selectedPassengers.includes(w) ? ' on' : '');
    chip.textContent = w;
    chip.onclick = () => togglePassenger(w);
    container.appendChild(chip);
  });
}

function togglePassenger(w) {
  if (selectedPassengers.includes(w)) {
    selectedPassengers = selectedPassengers.filter(p => p !== w);
  } else {
    selectedPassengers.push(w);
  }
  renderPassengerChips();
  saveDraft();
}

// ======================= CALCULATIONS =======================
function calculateDurations(rec) {
  const t = rec.times;
  let driveMins = null, workMins = null;
  if (t.start_drive && t.end_drive) {
    driveMins = Math.round((new Date(t.end_drive) - new Date(t.start_drive)) / 60000);
  }
  if (t.start_work && t.end_work) {
    workMins = Math.round((new Date(t.end_work) - new Date(t.start_work)) / 60000);
  }
  return { driveMins, workMins };
}

function formatMins(m) {
  if (m === null) return '—';
  const h = Math.floor(m / 60);
  const min = m % 60;
  return `${h}h ${min < 10 ? '0' + min : min}m`;
}

// ======================= SAVE RECORD =======================
function saveRecord() {
  const workerVal = document.getElementById('worker').value;
  const dateVal = document.getElementById('workdate').value || new Date().toISOString().split('T')[0];
  
  if (!workerVal) { alert('Wybierz pracownika!'); return; }

  const rec = {
    date: dateVal,
    worker: workerVal,
    contract: document.getElementById('contract').value,
    driver: document.getElementById('driver').value,
    car: document.getElementById('car').value,
    passengers: [...selectedPassengers],
    times: {},
    geos: {...geos}
  };
  Object.keys(times).forEach(k => rec.times[k] = times[k] ? times[k].toISOString() : null);

  // Перевірка: чи є вже запис за цим днем і цим працівником?
  const index = records.findIndex(r => r.date === rec.date && r.worker === rec.worker);

  if (index > -1) {
    const existing = records[index];
    Object.assign(existing.times, rec.times);
    Object.assign(existing.geos, rec.geos);
    existing.contract = rec.contract;
    existing.driver = rec.driver;
    existing.car = rec.car;
    if (rec.passengers.length) existing.passengers = [...new Set([...(existing.passengers || []), ...rec.passengers])];
    alert('✅ Zaktualizowano wpis z tego dnia dla tego pracownika');
  } else {
    records.push(rec);
    alert('✅ Zapisano nowy wpis');
  }

  safeStorage.setItem('records', JSON.stringify(records));
  clearDraft();
  resetForm();
}

// ======================= STATS & RECORDS LIST =======================
function loadStats() {
  let totalDrive = 0, totalWork = 0;
  records.forEach(r => {
    const d = calculateDurations(r);
    if (d.driveMins) totalDrive += d.driveMins;
    if (d.workMins) totalWork += d.workMins;
  });
  
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val" style="color:var(--cyan)">${records.length}</div><div class="stat-label">Wpisów łącznie</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${formatMins(totalDrive)}</div><div class="stat-label">Czas dojazdu</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${formatMins(totalWork)}</div><div class="stat-label">Czas pracy</div></div>
  `;
}

function loadRecords() {
  const list = document.getElementById('rec-list');
  if (records.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px;">Brak wpisów</div>';
    return;
  }
  list.innerHTML = '';
  // Сортування за датою (нові зверху)
  const sorted = [...records].sort((a,b) => new Date(b.date) - new Date(a.date));
  
  sorted.forEach((r, idx) => {
    const d = calculateDurations(r);
    const origIdx = records.indexOf(r);
    
    const div = document.createElement('div');
    div.className = 'rec-card';
    div.innerHTML = `
      <div class="rec-header">
        <div class="rec-date">${r.date}</div>
        <button class="tbtn" style="flex:0; padding:4px 8px; color:var(--red); border-color:rgba(239,68,68,0.3);" onclick="deleteRecord(${origIdx})">✖</button>
      </div>
      <div class="rec-body">
        <strong>👷 ${r.worker}</strong> ${r.contract ? '('+r.contract+')' : ''}<br>
        ${r.driver ? '🚗 Kierowca: '+r.driver+' '+r.car : ''} ${r.passengers && r.passengers.length ? '| Pasażerowie: '+r.passengers.join(', ') : ''}<br>
        <span style="color:var(--cyan)">Dojazd: ${formatMins(d.driveMins)}</span> | <span style="color:var(--green)">Praca: ${formatMins(d.workMins)}</span>
      </div>`;
    list.appendChild(div);
  });
}

function deleteRecord(idx) {
  if (confirm('Usunąć ten wpis?')) {
    records.splice(idx, 1);
    safeStorage.setItem('records', JSON.stringify(records));
    loadRecords();
    loadStats();
  }
}

// ======================= SETTINGS =======================
function populateSelects() {
  ['worker', 'driver'].forEach(id => {
    const sel = document.getElementById(id);
    const val = sel.value;
    sel.innerHTML = '<option value="">— wybierz —</option>';
    workers.forEach(w => sel.innerHTML += `<option value="${w}">${w}</option>`);
    sel.value = val;
  });
  
  const cSel = document.getElementById('contract');
  const cVal = cSel.value;
  cSel.innerHTML = '<option value="">— wybierz —</option>';
  contracts.forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
  cSel.value = cVal;

  const carSel = document.getElementById('car');
  const carVal = carSel.value;
  carSel.innerHTML = '<option value="">— wybierz —</option>';
  cars.forEach(c => carSel.innerHTML += `<option value="${c}">${c}</option>`);
  carSel.value = carVal;
}

function addSetting(type, inputId) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  
  if (type === 'workers' && !workers.includes(val)) workers.push(val);
  if (type === 'contracts' && !contracts.includes(val)) contracts.push(val);
  if (type === 'cars' && !cars.includes(val)) cars.push(val);
  
  safeStorage.setItem(type, JSON.stringify(eval(type))); // Зберігаємо масив
  input.value = '';
  populateSelects();
  renderSettings();
  if (type === 'workers') renderPassengerChips();
}

function removeSetting(type, val) {
  if (type === 'workers') workers = workers.filter(x => x !== val);
  if (type === 'contracts') contracts = contracts.filter(x => x !== val);
  if (type === 'cars') cars = cars.filter(x => x !== val);
  
  safeStorage.setItem(type, JSON.stringify(eval(type)));
  populateSelects();
  renderSettings();
  if (type === 'workers') renderPassengerChips();
}

function renderSettings() {
  ['workers', 'contracts', 'cars'].forEach(type => {
    const list = document.getElementById('list-' + type);
    const arr = eval(type);
    if (arr.length === 0) {
      list.innerHTML = '<div style="font-size:12px;color:var(--text3)">Brak danych</div>';
      return;
    }
    list.innerHTML = '';
    arr.forEach(val => {
      list.innerHTML += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);">
        <span style="font-size:14px">${val}</span>
        <button class="tbtn" style="flex:0;padding:4px 8px;color:var(--red)" onclick="removeSetting('${type}','${val}')">✖</button>
      </div>`;
    });
  });
}

function clearAllData() {
  if (confirm('Uwaga! To usunie WSZYSTKIE wpisy, pracowników i ustawienia. Kontynuować?')) {
    localStorage.clear();
    workers = []; cars = []; contracts = []; records = [];
    populateSelects();
    renderSettings();
    loadRecords();
    loadStats();
  }
}

// ======================= EXPORT =======================
function exportToXlsx() {
  if (records.length === 0) { alert('Brak danych do eksportu'); return; }
  const data = records.map(r => {
    const d = calculateDurations(r);
    return {
      'Data': r.date,
      'Pracownik': r.worker,
      'Kontrakt': r.contract,
      'Kierowca': r.driver,
      'Samochód': r.car,
      'Pasażerowie': (r.passengers || []).join(', '),
      'Start dojazdu': r.times.start_drive ? new Date(r.times.start_drive).toLocaleTimeString() : '',
      'Koniec dojazdu': r.times.end_drive ? new Date(r.times.end_drive).toLocaleTimeString() : '',
      'Czas dojazdu': formatMins(d.driveMins),
      'Start pracy': r.times.start_work ? new Date(r.times.start_work).toLocaleTimeString() : '',
      'Koniec pracy': r.times.end_work ? new Date(r.times.end_work).toLocaleTimeString() : '',
      'Czas pracy': formatMins(d.workMins)
    };
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Ewidencja");
  XLSX.writeFile(wb, `ewidencja_${new Date().toISOString().split('T')[0]}.xlsx`);
}

function exportToCsv() {
  if (records.length === 0) { alert('Brak danych do eksportu'); return; }
  let csv = "Data,Pracownik,Kontrakt,Kierowca,Samochod,Pasazerowie,Start_dojazdu,Koniec_dojazdu,Czas_dojazdu,Start_pracy,Koniec_pracy,Czas_pracy\n";
  records.forEach(r => {
    const d = calculateDurations(r);
    csv += `${r.date},${r.worker},${r.contract},${r.driver},${r.car},"${(r.passengers||[]).join('; ')}",${r.times.start_drive ? new Date(r.times.start_drive).toLocaleTimeString() : ''},${r.times.end_drive ? new Date(r.times.end_drive).toLocaleTimeString() : ''},${formatMins(d.driveMins)},${r.times.start_work ? new Date(r.times.start_work).toLocaleTimeString() : ''},${r.times.end_work ? new Date(r.times.end_work).toLocaleTimeString() : ''},${formatMins(d.workMins)}\n`;
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `ewidencja_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
}

// ======================= RESET FORM =======================
function resetForm() {
  document.getElementById('worker').value = '';
  document.getElementById('contract').value = '';
  document.getElementById('driver').value = '';
  document.getElementById('car').value = '';
  document.getElementById('workdate').value = new Date().toISOString().split('T')[0];
  
  times = {};
  geos = {};
  selectedPassengers = [];
  
  // Очистка карти
  if (map) {
    Object.keys(markers).forEach(k => map.removeLayer(markers[k]));
  }
  markers = {};
  if(map) map.setView([52.0, 19.0], 5); // Центр Польщі
  
  initTimeBlocks();
  renderPassengerChips();
  clearDraft();
}

// ======================= INIT =======================
window.onload = () => {
  // Встановлюємо сьогоднішню дату
  document.getElementById('workdate').value = new Date().toISOString().split('T')[0];
  
  // Заповнюємо випадаючі списки
  populateSelects();
  
  // Ініціалізуємо блоки часу
  initTimeBlocks();
  
  // Ініціалізуємо карту
  map = L.map('map').setView([52.0, 19.0], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
  
  // Відновлюємо чернетку
  loadDraft();
  renderPassengerChips();
  
  console.log('%c✅ Ewidencja PRO – всі блоки + гео + логіка працюють!', 'color:#22c55e;font-weight:600');
};
</script>
