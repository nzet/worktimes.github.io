<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ewidencja czasu pracy</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:15px}
button{margin:5px;padding:10px}
</style>
</head>
<body>

<h2>Ewidencja czasu pracy</h2>

<select id="worker"></select>
<select id="contract"></select>

<br><br>

<button onclick="stamp('d1')">Start dojazdu</button>
<button onclick="stamp('d2')">Koniec dojazdu</button>
<button onclick="stamp('w1')">Start pracy</button>
<button onclick="stamp('w2')">Koniec pracy</button>

<br><br>

<button onclick="saveRecord()">ZAPISZ</button>

<script>
// =====================
// KEYS
// =====================
const DB_KEY = 'wt_records';
const DRAFT_KEY = 'wt_active_draft';

// =====================
// STATE
// =====================
let records = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
let draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || 'null');

// =====================
// INIT
// =====================
if (!draft) {
  draft = createDraft();
  persistDraft();
}

initSelects();
restoreUI();

// =====================
// CREATE DRAFT
// =====================
function createDraft() {
  return {
    id: Date.now().toString(),
    date: today(),
    worker: '',
    contract: '',
    times: { d1:null,d2:null,w1:null,w2:null },
    geo: { d1:null,d2:null,w1:null,w2:null }
  };
}

function today() {
  return new Date().toISOString().split('T')[0];
}

// =====================
// PERSIST
// =====================
function persistDraft() {
  localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
  draft = createDraft();
}

function saveRecords() {
  localStorage.setItem(DB_KEY, JSON.stringify(records));
}

// =====================
// UI INIT
// =====================
function initSelects() {
  const workers = ['Worker A','Worker B'];
  const contracts = ['Contract A','Contract B'];

  const w = document.getElementById('worker');
  const c = document.getElementById('contract');

  w.innerHTML = '<option value="">--worker--</option>' + workers.map(x=>`<option>${x}</option>`).join('');
  c.innerHTML = '<option value="">--contract--</option>' + contracts.map(x=>`<option>${x}</option>`).join('');

  w.onchange = () => { draft.worker = w.value; persistDraft(); };
  c.onchange = () => { draft.contract = c.value; persistDraft(); };
}

function restoreUI() {
  document.getElementById('worker').value = draft.worker;
  document.getElementById('contract').value = draft.contract;
}

// =====================
// TIME
// =====================
function stamp(key) {
  const t = new Date().toTimeString().slice(0,5);
  draft.times[key] = t;
  persistDraft();
  console.log('STAMP', key, t);
}

// =====================
// GEO
// =====================
function getGeo(key) {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    draft.geo[key] = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };
    persistDraft();
  });
}

// =====================
// CALC
// =====================
function minDiff(t1,t2) {
  if(!t1||!t2) return null;
  const [h1,m1]=t1.split(':').map(Number);
  const [h2,m2]=t2.split(':').map(Number);
  let d=(h2*60+m2)-(h1*60+m1);
  if(d<0)d+=1440;
  return d;
}

// =====================
// SAVE RECORD
// =====================
function saveRecord() {
  if (!draft.worker || !draft.contract) {
    alert('Wybierz pracownika i kontrakt');
    return;
  }

  const rec = {
    ...draft,
    commuteMin: minDiff(draft.times.d1, draft.times.d2),
    workMin: minDiff(draft.times.w1, draft.times.w2)
  };

  records.unshift(rec);
  saveRecords();

  clearDraft();
  persistDraft();

  alert('Zapisano');
  console.log(records);
}

// =====================
// SERVICE WORKER
// =====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
